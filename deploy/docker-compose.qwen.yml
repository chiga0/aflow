services:
  runtime:
    build:
      dockerfile: deploy/Dockerfile.runtime-qwen
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.13-slim}
        QWEN_NODE_PACKAGE: ${QWEN_NODE_PACKAGE:-@qwen-code/qwen-code@0.19.11}
        RUNTIME_UID: ${RUNTIME_UID:-1000}
        RUNTIME_GID: ${RUNTIME_GID:-1000}
    environment:
      HOME: /home/runtime
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
      V2_ENABLE_REAL_CLI_ADAPTERS: "1"
      V2_AUTO_ADAPTER: ${V2_AUTO_ADAPTER:-qwen}
      V2_QWEN_CODE_COMMAND: ${V2_QWEN_CODE_COMMAND:-qwen --safe-mode --yolo}
      V2_CLI_TIMEOUT_SECONDS: ${V2_CLI_TIMEOUT_SECONDS:-1800}
      V2_WORKSPACE_ROOT: /workspace
    volumes:
      - type: bind
        source: ${AGENTFLOW_WORKSPACE_DIR:?set AGENTFLOW_WORKSPACE_DIR to an absolute directory}
        target: /workspace
      - type: volume
        source: qwen-state
        target: /home/runtime/.qwen
      - type: bind
        source: ${QWEN_SETTINGS_FILE:?set QWEN_SETTINGS_FILE to settings.json}
        target: /home/runtime/.qwen/settings.json
        read_only: true
    read_only: true
    init: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s

volumes:
  qwen-state:
